# CorpIntel India - single-command stack for local and self-hosted deployment.
#
# Usage:  cp .env.example .env  &&  docker compose up --build

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # ports:
    #   - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # ports:
    #   - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=${DB_NAME:-corpintel}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      - mongodb
      - redis
    # ports:
    #   - "8001:8001"

  celery-worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=${DB_NAME:-corpintel}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "-Q", "ingestion,classification,alerts,quality_scoring"]
    depends_on:
      - mongodb
      - redis

  celery-enrichment-worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=${DB_NAME:-corpintel}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "-Q", "enrichment", "--concurrency=1"]
    depends_on:
      - mongodb
      - redis

  celery-beat:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=${DB_NAME:-corpintel}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    command: ["celery", "-A", "celery_app", "beat", "--loglevel=info"]
    depends_on:
      - mongodb
      - redis

  flower:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=${DB_NAME:-corpintel}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    command: ["celery", "-A", "celery_app", "flower", "--port=5555"]
    depends_on:
      - redis
    ports:
      - "${FLOWER_PORT:-5555}:5555"

  frontend:
    build:
      context: ./frontend-next
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8001}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8001}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      - backend
    # ports:
    #   - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "${PORT_HTTP:-8080}:80"

volumes:
  mongo_data:
