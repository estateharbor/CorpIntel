# CorpIntel India - single-command stack for local and self-hosted deployment.
#
# The scheduler runs inside the backend image already, so the dedicated
# `scheduler` service is an optional separate worker.
#
# Usage:  cp .env.example .env  &&  docker compose up --build

version: "3.9"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # ports:
    #   - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # ports:
    #   - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=${DB_NAME:-corpintel}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    # ports:
    #   - "8001:8001"

  # Optional dedicated scheduler worker (APScheduler also runs in backend).
  scheduler:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=${DB_NAME:-corpintel}
      - REDIS_URL=redis://redis:6379/0
      - RUN_SCHEDULER_ONLY=true
    command: ["python", "-m", "scripts.seed"]
    depends_on:
      - mongodb
      - backend

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    restart: unless-stopped
    depends_on:
      - backend
    # ports:
    #   - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "${PORT_HTTP:-8080}:80"

volumes:
  mongo_data:
